<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Idea Submission</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 200px; height: auto; }

        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: #c41e3a; font-size: 28px; margin-bottom: 8px; }
        .header p { color: #666; font-size: 14px; }

        /* Language toggle */
        .language-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .lang-btn {
            padding: 10px 24px;
            border: 2px solid #c41e3a;
            background: white;
            color: #c41e3a;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
        }
        .lang-btn:hover { transform: translateY(-2px); }


        /* Plant selection */
        .plant-selection {
            margin-bottom: 24px;
            padding: 16px;
            background: #fff5f5;
            border: 2px solid #c41e3a;
            border-radius: 10px;
        }
        .plant-selection label {
            display: block;
            font-weight: 700;
            color: #c41e3a;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .plant-btns {
            display: flex;
            gap: 10px;
        }
        .plant-btn {
            flex: 1;
            padding: 12px 10px;
            border: 2px solid #c41e3a;
            background: white;
            color: #c41e3a;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .plant-btn.active {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
        }
        .plant-btn:hover { transform: translateY(-2px); }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #c41e3a;
        }
        textarea { resize: vertical; min-height: 120px; }
        select { cursor: pointer; background-color: white; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(196,30,58,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .required { color: #c41e3a; }

        .loading { display: none; text-align: center; margin-top: 10px; }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c41e3a;
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        .optional-field { display: none; }
        .optional-field.show { display: block; }

        .yes-no-toggle { display: flex; gap: 10px; margin-top: 8px; }
        .toggle-btn {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .toggle-btn.active { border-color: #c41e3a; background: #c41e3a; color: white; }
        .toggle-btn:hover { border-color: #c41e3a; }

        /* Photo upload */
        .photo-upload-section { margin-top: 10px; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            border: 2px dashed #c41e3a;
            background: #fff5f5;
            color: #c41e3a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }
        .file-input-btn:hover { background: #ffe0e0; border-color: #8b0000; }
        .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .photo-item { position: relative; border: 2px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .photo-item img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .remove-photo {
            position: absolute;
            top: 5px; right: 5px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px; height: 25px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: all 0.3s;
        }
        .remove-photo:hover { background: #8b0000; transform: scale(1.1); }
        .photo-count { margin-top: 8px; font-size: 13px; color: #c41e3a; font-weight: 500; }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .loading-overlay.active { display: flex; }
        .loading-overlay .overlay-spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            width: 56px; height: 56px;
            animation: spin 0.9s linear infinite;
        }
        .loading-overlay p { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }

        /* Success modal */
        .success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-modal.active { display: flex; }
        .success-modal-box {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
            animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
        .success-modal-box .check-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        .success-modal-box h2 { color: #1e7e34; font-size: 22px; margin-bottom: 10px; }
        .success-modal-box p { color: #555; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
        .success-modal-box .ok-btn {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .success-modal-box .ok-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(196,30,58,0.4); }

        /* Responsive */
        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 12px; }
            .header h1 { font-size: 22px; }
            .header p { font-size: 13px; }
            .logo-container img { max-width: 150px; }
            .form-group { margin-bottom: 20px; }
            input[type="text"], input[type="email"], input[type="tel"], select, textarea { padding: 10px 14px; font-size: 16px; }
            .lang-btn { padding: 8px 20px; font-size: 13px; }
            .yes-no-toggle { flex-wrap: wrap; }
            .toggle-btn { padding: 8px 16px; font-size: 13px; }
            .submit-btn { padding: 12px; font-size: 15px; }
            label { font-size: 13px; }
            .plant-btn { font-size: 13px; padding: 10px 8px; }
        }
        @media screen and (max-width: 480px) {
            .container { padding: 15px; }
            .header h1 { font-size: 20px; }
            .logo-container img { max-width: 120px; }
            .toggle-btn { flex: 1; min-width: 80px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .photo-item img { height: 120px; }
            .plant-btns { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="overlay-spinner"></div>
        <p id="overlayText">Submitting your Kaizen...</p>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="success-modal-box">
            <div class="check-circle">✓</div>
            <h2 id="successTitle">Kaizen Submitted Successfully!</h2>
            <p id="successDesc">Thank you for your valuable idea. Your Kaizen has been recorded and will be reviewed by the team.</p>
            <button class="ok-btn" onclick="closeSuccessModal()" id="successOkBtn">OK</button>
        </div>
    </div>

    <div class="container">
        <div class="logo-container">
            <img src="preview.jpeg" alt="Company Logo">
        </div>

        <div class="header">
            <h1 id="mainTitle">💡 Kaizen Idea Submission</h1>
            <p id="subtitle">Share your continuous improvement ideas</p>
        </div>

        <!-- Language Toggle -->
        <div class="language-toggle">
            <button type="button" class="lang-btn active" onclick="setLanguage('en')" id="btnEnglish">English</button>
            <button type="button" class="lang-btn" onclick="setLanguage('hi')" id="btnHindi">हिंदी</button>
        </div>

        <!-- Plant Selection (compulsory) -->
        <div class="plant-selection">
            <label id="lblPlant">🏭 Select Plant <span class="required">*</span></label>
            <div class="plant-btns">
                <button type="button" class="plant-btn" onclick="selectPlant('vasai')" id="btnVasai">Vasai Plant</button>
                <button type="button" class="plant-btn" onclick="selectPlant('kaman')" id="btnKaman">Kaman Plant</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <form id="kaizenForm">
            <div class="form-group">
                <label for="name" id="lblName">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="mobile" id="lblMobile">Mobile Number <span class="required">*</span></label>
                <input type="tel" id="mobile" name="mobile" required placeholder="Enter your 10-digit mobile number" maxlength="10" pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label id="lblProvideEmail">Do you want to provide your email?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('email', true)" id="btnEmailYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('email', false)" id="btnEmailNo">No</button>
                </div>
            </div>
            <div class="form-group optional-field" id="emailField">
                <label for="email" id="lblEmail">Email</label>
                <input type="email" id="email" name="email" placeholder="your.email@company.com">
            </div>

            <div class="form-group">
                <label id="lblProvideEmpId">Do you want to provide your Employee ID?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('employeeId', true)" id="btnEmpIdYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('employeeId', false)" id="btnEmpIdNo">No</button>
                </div>
            </div>
            <div class="form-group optional-field" id="employeeIdField">
                <label for="employeeId" id="lblEmployeeId">Employee ID</label>
                <input type="text" id="employeeId" name="employeeId" placeholder="Enter your employee ID">
            </div>

            <div class="form-group">
                <label for="department" id="lblDepartment">Department / Zone <span class="required">*</span></label>
                <select id="department" name="department" required>
                    <option value="">Select your department</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kaizenIdea" id="lblKaizenIdea">Kaizen Idea <span class="required">*</span></label>
                <textarea id="kaizenIdea" name="kaizenIdea" required placeholder="Describe your improvement idea in detail..."></textarea>
            </div>

            <div class="form-group">
                <label for="category" id="lblCategory">Category</label>
                <select id="category" name="category">
                    <option value="">Select category (optional)</option>
                    <option value="QUALITY">QUALITY</option>
                    <option value="SAFETY">SAFETY</option>
                    <option value="DELIVERY">DELIVERY</option>
                    <option value="COST">COST</option>
                    <option value="TIME">TIME</option>
                    <option value="SYSTEM">SYSTEM</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lblProvidePhoto">Do you want to attach photos?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('photo', true)" id="btnPhotoYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('photo', false)" id="btnPhotoNo">No</button>
                </div>
            </div>
            <div class="form-group optional-field photo-upload-section" id="photoField">
                <label for="photo" id="lblPhoto">Upload Photos (Max 5)</label>
                <div class="file-input-wrapper">
                    <label for="photo" class="file-input-btn">
                        <span>📷</span>
                        <span id="photoText">Choose Photos</span>
                    </label>
                    <input type="file" id="photo" name="photo" accept="image/*" multiple onchange="handlePhotoUpload(event)">
                </div>
                <div class="photo-count" id="photoCount"></div>
                <div class="photo-grid" id="photoGrid"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top:10px;color:#666;">Submitting...</p>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Idea</button>
        </form>
    </div>

                ideaPlaceholder: 'अपने सुधार विचार का विस्तार से वर्णन करें...',
                lblCategory: 'श्रेणी',
                categoryPlaceholder: 'श्रेणी चुनें (वैकल्पिक)',
                lblProvidePhoto: 'क्या आप फोटो संलग्न करना चाहते हैं?',
                lblPhoto: 'फोटो अपलोड करें (अधिकतम 5)',
                photoText: 'फोटो चुनें',
                photoCount: 'फोटो चयनित',
                photoMax: 'अधिकतम 5 फोटो की अनुमति है',
                btnYes: 'हाँ',
                btnNo: 'नहीं',
                submitBtn: 'विचार जमा करें',
                submitting: 'जमा किया जा रहा है...',
                successModalTitle: 'काइज़न सफलतापूर्वक सबमिट हो गया!',
                successModalDesc: 'आपके मूल्यवान विचार के लिए धन्यवाद। आपका काइज़न दर्ज कर लिया गया है और टीम द्वारा समीक्षा की जाएगी।',
                successOkBtn: 'ठीक है',
                mobileError: 'कृपया एक वैध 10 अंकों का मोबाइल नंबर दर्ज करें।',
                plantError: 'कृपया सबमिट करने से पहले एक प्लांट चुनें।',
                errorMsg: 'आपका विचार सबमिट करने में त्रुटि हुई। कृपया पुनः प्रयास करें।',
                categories: {
                    select: 'श्रेणी चुनें (वैकल्पिक)',
                    quality: 'गुणवत्ता (QUALITY)', safety: 'सुरक्षा (SAFETY)',
                    delivery: 'डिलीवरी (DELIVERY)', cost: 'लागत (COST)',
                    time: 'समय (TIME)', system: 'सिस्टम (SYSTEM)'
                }
            }
        };

        // ── Plant selection ───────────────────────────────────────────
        function selectPlant(plant) {
            currentPlant = plant;
            document.getElementById('btnVasai').classList.toggle('active', plant === 'vasai');
            document.getElementById('btnKaman').classList.toggle('active', plant === 'kaman');
            populateDepartments();
        }

        function populateDepartments() {
            const deptSelect = document.getElementById('department');
            const t = translations[currentLanguage];
            const zones = currentPlant === 'kaman' ? kamanZones : vasaiZones;

            deptSelect.innerHTML = `<option value="">${t.deptPlaceholder}</option>`;
            zones.forEach(z => {
                const opt = document.createElement('option');
                opt.value = z.value;
                opt.textContent = z.label;
                deptSelect.appendChild(opt);
            });
        }

        // ── Language ─────────────────────────────────────────────────
        function setLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];

            document.getElementById('btnEnglish').classList.toggle('active', lang === 'en');
            document.getElementById('btnHindi').classList.toggle('active', lang === 'hi');

            document.getElementById('mainTitle').textContent = t.mainTitle;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('lblPlant').innerHTML = t.lblPlant + ' <span class="required">*</span>';
            document.getElementById('lblName').innerHTML = t.lblName + ' <span class="required">*</span>';
            document.getElementById('name').placeholder = t.namePlaceholder;
            document.getElementById('lblMobile').innerHTML = t.lblMobile + ' <span class="required">*</span>';
            document.getElementById('mobile').placeholder = t.mobilePlaceholder;
            document.getElementById('lblProvideEmail').textContent = t.lblProvideEmail;
            document.getElementById('lblEmail').textContent = t.lblEmail;
            document.getElementById('email').placeholder = t.emailPlaceholder;
            document.getElementById('lblProvideEmpId').textContent = t.lblProvideEmpId;
            document.getElementById('lblEmployeeId').textContent = t.lblEmployeeId;
            document.getElementById('employeeId').placeholder = t.empIdPlaceholder;
            document.getElementById('lblDepartment').innerHTML = t.lblDepartment + ' <span class="required">*</span>';
            document.getElementById('lblKaizenIdea').innerHTML = t.lblKaizenIdea + ' <span class="required">*</span>';
            document.getElementById('kaizenIdea').placeholder = t.ideaPlaceholder;
            document.getElementById('lblCategory').textContent = t.lblCategory;
            document.getElementById('lblProvidePhoto').textContent = t.lblProvidePhoto;
            document.getElementById('lblPhoto').textContent = t.lblPhoto;
            document.getElementById('photoText').textContent = t.photoText;
            document.getElementById('submitBtn').textContent = t.submitBtn;

            document.getElementById('btnEmailYes').textContent = t.btnYes;
            document.getElementById('btnEmailNo').textContent = t.btnNo;
            document.getElementById('btnEmpIdYes').textContent = t.btnYes;
            document.getElementById('btnEmpIdNo').textContent = t.btnNo;
            document.getElementById('btnPhotoYes').textContent = t.btnYes;
            document.getElementById('btnPhotoNo').textContent = t.btnNo;

            // Category dropdown
            const catSelect = document.getElementById('category');
            const c = t.categories;
            catSelect.options[0].text = c.select;
            catSelect.options[1].text = c.quality;
            catSelect.options[2].text = c.safety;
            catSelect.options[3].text = c.delivery;
            catSelect.options[4].text = c.cost;
            catSelect.options[5].text = c.time;
            catSelect.options[6].text = c.system;

            // Re-populate departments with same zones but updated placeholder
            if (currentPlant) populateDepartments();
        }

        // ── Optional fields ───────────────────────────────────────────
        function toggleOptionalField(fieldName, show) {
            const field = document.getElementById(fieldName + 'Field');
            const input = document.getElementById(fieldName);

            if (show) {
                field.classList.add('show');
                if (fieldName === 'email')      { document.getElementById('btnEmailYes').classList.add('active'); document.getElementById('btnEmailNo').classList.remove('active'); }
                else if (fieldName === 'employeeId') { document.getElementById('btnEmpIdYes').classList.add('active'); document.getElementById('btnEmpIdNo').classList.remove('active'); }
                else if (fieldName === 'photo') { document.getElementById('btnPhotoYes').classList.add('active'); document.getElementById('btnPhotoNo').classList.remove('active'); }
            } else {
                field.classList.remove('show');
                if (fieldName === 'photo') removePhoto();
                else input.value = '';
                if (fieldName === 'email')      { document.getElementById('btnEmailYes').classList.remove('active'); document.getElementById('btnEmailNo').classList.add('active'); }
                else if (fieldName === 'employeeId') { document.getElementById('btnEmpIdYes').classList.remove('active'); document.getElementById('btnEmpIdNo').classList.add('active'); }
                else if (fieldName === 'photo') { document.getElementById('btnPhotoYes').classList.remove('active'); document.getElementById('btnPhotoNo').classList.add('active'); }
            }
        }

        // ── Photo upload ──────────────────────────────────────────────
        let uploadedPhotos = [];
        const MAX_PHOTOS = 5;

        function handlePhotoUpload(event) {
            const files = Array.from(event.target.files);
            const t = translations[currentLanguage];
            if (uploadedPhotos.length + files.length > MAX_PHOTOS) {
                alert(t.photoMax);
                event.target.value = '';
                return;
            }
            files.forEach(file => {
                if (uploadedPhotos.length < MAX_PHOTOS) {
                    compressImage(file, 800, 0.72).then(b64 => {
                        uploadedPhotos.push({ base64: b64, name: file.name });
                        updatePhotoGrid();
                    });
                }
            });
        }

        function compressImage(file, maxSize, quality) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else       { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updatePhotoGrid() {
            const grid = document.getElementById('photoGrid');
            const countEl = document.getElementById('photoCount');
            const t = translations[currentLanguage];
            grid.innerHTML = '';
            uploadedPhotos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `<img src="${photo.base64}" alt="${photo.name}"><button type="button" class="remove-photo" onclick="removePhoto(${index})">×</button>`;
                grid.appendChild(item);
            });
            countEl.textContent = uploadedPhotos.length > 0 ? `${uploadedPhotos.length} ${t.photoCount}` : '';
        }

        function removePhoto(index) {
            if (index !== undefined) uploadedPhotos.splice(index, 1);
            else uploadedPhotos = [];
            document.getElementById('photo').value = '';
            updatePhotoGrid();
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        // ── Submit ────────────────────────────────────────────────────
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const t = translations[currentLanguage];

            if (!currentPlant) {
                alert(t.plantError);
                return;
            }

            const mobile = document.getElementById('mobile').value.trim();
            if (!/^[0-9]{10}$/.test(mobile)) {
                alert(t.mobileError);
                document.getElementById('mobile').focus();
                return;
            }

            // Determine which Google Sheet tab name to use
            const sheetName = currentPlant === 'vasai' ? 'Vasai Plant' : 'Kaman Plant';

            const formData = {
                timestamp: new Date().toLocaleString(),
                plant: sheetName,
                name: document.getElementById('name').value.trim(),
                mobile,
                email: document.getElementById('email').value.trim() || 'Not provided',
                employeeId: document.getElementById('employeeId').value.trim() || 'Not provided',
                department: document.getElementById('department').value,
                kaizenIdea: document.getElementById('kaizenIdea').value.trim(),
                category: document.getElementById('category').value || 'Not specified',
                photos: uploadedPhotos.length > 0 ? uploadedPhotos : [{ base64: 'No photo attached', name: 'none' }],
                sheetName   // tells the Apps Script which tab to write to — "Vasai Plant" or "Kaman Plant"
            };

            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('overlayText').textContent = t.submitting;
            overlay.classList.add('active');
            submitBtn.disabled = true;
            message.style.display = 'none';

            console.log('Submitting to sheet:', sheetName, '| formData.sheetName:', formData.sheetName);

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                overlay.classList.remove('active');
                document.getElementById('successTitle').textContent = t.successModalTitle;
                document.getElementById('successDesc').textContent = t.successModalDesc;
                document.getElementById('successOkBtn').textContent = t.successOkBtn;
                document.getElementById('successModal').classList.add('active');

                form.reset();
                uploadedPhotos = [];
                updatePhotoGrid();
                toggleOptionalField('email', false);
                toggleOptionalField('employeeId', false);
                toggleOptionalField('photo', false);
                // Reset plant selection
                currentPlant = null;
                document.getElementById('btnVasai').classList.remove('active');
                document.getElementById('btnKaman').classList.remove('active');
                document.getElementById('department').innerHTML = '<option value="">Select your department</option>';

            } catch (error) {
                console.error('Error:', error);
                overlay.classList.remove('active');
                showMessage(t.errorMsg, 'error');
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('active');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            if (type === 'success') setTimeout(() => { message.style.display = 'none'; }, 5000);
        }
    </script>
