<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Idea Submission</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 200px;
            height: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #c41e3a;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #c41e3a;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select {
            cursor: pointer;
            background-color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(196, 30, 58, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .required {
            color: #c41e3a;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c41e3a;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .language-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .lang-btn {
            padding: 10px 24px;
            border: 2px solid #c41e3a;
            background: white;
            color: #c41e3a;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
        }

        .optional-field {
            display: none;
        }

        .optional-field.show {
            display: block;
        }

        .yes-no-toggle {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .toggle-btn {
            padding: 8px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            border-color: #c41e3a;
            background: #c41e3a;
            color: white;
        }

        .toggle-btn:hover {
            border-color: #c41e3a;
        }

        .photo-upload-section {
            margin-top: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            border: 2px dashed #c41e3a;
            background: #fff5f5;
            color: #c41e3a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .file-input-btn:hover {
            background: #ffe0e0;
            border-color: #8b0000;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .photo-preview {
            margin-top: 12px;
            display: none;
        }

        .photo-preview.show {
            display: block;
        }

        .preview-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .remove-photo {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.3s;
        }

        .remove-photo:hover {
            background: #8b0000;
            transform: scale(1.1);
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header p {
                font-size: 13px;
            }

            .logo-container img {
                max-width: 150px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            input[type="text"],
            input[type="email"],
            select,
            textarea {
                padding: 10px 14px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .language-toggle {
                flex-direction: row;
                gap: 8px;
            }

            .lang-btn {
                padding: 8px 20px;
                font-size: 13px;
            }

            .yes-no-toggle {
                flex-wrap: wrap;
            }

            .toggle-btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 15px;
            }

            label {
                font-size: 13px;
            }
        }

        @media screen and (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .logo-container img {
                max-width: 120px;
            }

            .language-toggle {
                gap: 6px;
            }

            .lang-btn {
                padding: 7px 16px;
                font-size: 12px;
            }

            .toggle-btn {
                flex: 1;
                min-width: 80px;
            }

            .preview-image {
                max-height: 200px;
            }
        }

        /* Multiple photos styling */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .photo-item {
            position: relative;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .photo-item .remove-photo {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            font-size: 16px;
        }

        .photo-count {
            margin-top: 8px;
            font-size: 13px;
            color: #c41e3a;
            font-weight: 500;
        }

        @media screen and (max-width: 480px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .photo-item img {
                height: 120px;
            }
        }

        /* Full-screen loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-overlay .overlay-spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            animation: spin 0.9s linear infinite;
        }
        .loading-overlay p {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Success modal */
        .success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-modal.active {
            display: flex;
        }
        .success-modal-box {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .success-modal-box .check-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        .success-modal-box h2 {
            color: #1e7e34;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .success-modal-box p {
            color: #555;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .success-modal-box .ok-btn {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .success-modal-box .ok-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(196,30,58,0.4);
        }

        /* Phone input */
        input[type="tel"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        input[type="tel"]:focus {
            outline: none;
            border-color: #c41e3a;
        }
        @media screen and (max-width: 768px) {
            input[type="tel"] { padding: 10px 14px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- Full-screen loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="overlay-spinner"></div>
        <p id="overlayText">Submitting your Kaizen...</p>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="success-modal-box">
            <div class="check-circle">✓</div>
            <h2 id="successTitle">Kaizen Submitted Successfully!</h2>
            <p id="successDesc">Thank you for your valuable idea. Your Kaizen has been recorded and will be reviewed by the team.</p>
            <button class="ok-btn" onclick="closeSuccessModal()" id="successOkBtn">OK</button>
        </div>
    </div>

    <div class="container">
        <div class="logo-container">
            <img src="preview.jpeg" alt="Connect & Grow Logo">
        </div>
        
        <div class="header">
            <h1 id="mainTitle">💡 Kaizen Idea Submission</h1>
            <p id="subtitle">Share your continuous improvement ideas</p>
        </div>

        <div class="language-toggle">
            <button type="button" class="lang-btn active" onclick="setLanguage('en')" id="btnEnglish">English</button>
            <button type="button" class="lang-btn" onclick="setLanguage('hi')" id="btnHindi">हिंदी</button>
        </div>

        <div id="message" class="message"></div>

        <form id="kaizenForm">
            <div class="form-group">
                <label for="name" id="lblName">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="mobile" id="lblMobile">Mobile Number <span class="required">*</span></label>
                <input type="tel" id="mobile" name="mobile" required placeholder="Enter your 10-digit mobile number" maxlength="10" pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label id="lblProvideEmail">Do you want to provide your email?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('email', true)" id="btnEmailYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('email', false)" id="btnEmailNo">No</button>
                </div>
            </div>

            <div class="form-group optional-field" id="emailField">
                <label for="email" id="lblEmail">Email</label>
                <input type="email" id="email" name="email" placeholder="your.email@company.com">
            </div>

            <div class="form-group">
                <label id="lblProvideEmpId">Do you want to provide your Employee ID?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('employeeId', true)" id="btnEmpIdYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('employeeId', false)" id="btnEmpIdNo">No</button>
                </div>
            </div>

            <div class="form-group optional-field" id="employeeIdField">
                <label for="employeeId" id="lblEmployeeId">Employee ID</label>
                <input type="text" id="employeeId" name="employeeId" placeholder="Enter your employee ID">
            </div>

            <div class="form-group">
                <label for="department" id="lblDepartment">Department <span class="required">*</span></label>
                <select id="department" name="department" required>
                    <option value="">Select your department</option>
                    <option value="ZONE - A1 : STAMPING (PRESS-SHOP)">ZONE - A1 : STAMPING (PRESS-SHOP)</option>
                    <option value="ZONE - A2 : MAINTENANCE & STORE">ZONE - A2 : MAINTENANCE & STORE</option>
                    <option value="ZONE - A3 : TOOL ROOM & CMM">ZONE - A3 : TOOL ROOM & CMM</option>
                    <option value="ZONE - B1 : PRODUCT ENGINEERING (P.E.)">ZONE - B1 : PRODUCT ENGINEERING (P.E.)</option>
                    <option value="ZONE - B2 : OFFICE (SALES, MARKETING, ACCOUNTS, PURCHASE & HR)">ZONE - B2 : OFFICE (SALES, MARKETING, ACCOUNTS, PURCHASE & HR)</option>
                    <option value="ZONE - C1 : SQA RAW MATERIAL STORE - METAL STRIP">ZONE - C1 : SQA RAW MATERIAL STORE - METAL STRIP</option>
                    <option value="ZONE - C2 : PACKING & DISPATCH - STAMPING FINISHED GOOD STORE - STAMPING">ZONE - C2 : PACKING & DISPATCH - STAMPING FINISHED GOOD STORE - STAMPING</option>
                    <option value="ZONE - D1 : INJECTION MOULDING - FG STORE">ZONE - D1 : INJECTION MOULDING - FG STORE</option>
                    <option value="ZONE - D2 : SHOPFLOOR - INJECTION MOULDING IQA - INJECTION MOULDING">ZONE - D2 : SHOPFLOOR - INJECTION MOULDING IQA - INJECTION MOULDING</option>
                    <option value="ZONE - D3 : SPARKING & WIRE CUT">ZONE - D3 : SPARKING & WIRE CUT</option>
                    <option value="ZONE - E1 : IQA - STAMPING">ZONE - E1 : IQA - STAMPING</option>
                    <option value="ZONE - E2 : SHOPFLOOR - STAMPING IQA - STAMPING">ZONE - E2 : SHOPFLOOR - STAMPING IQA - STAMPING</option>
                    <option value="ZONE - F1 : ETS">ZONE - F1 : ETS</option>
                    <option value="ZONE - F2 : WIRE CUT">ZONE - F2 : WIRE CUT</option>
                    <option value="ZONE - G1 : TOOL MAINTENANCE">ZONE - G1 : TOOL MAINTENANCE</option>
                    <option value="ZONE - G2 : STAMPING & DEBURRING & ASSEMBLY (PRESS-SHOP)">ZONE - G2 : STAMPING & DEBURRING & ASSEMBLY (PRESS-SHOP)</option>
                    <option value="ZONE - G3 : WIRE CUT DESIGN & VALIDATION VISUAL INSPECTION AREA">ZONE - G3 : WIRE CUT DESIGN & VALIDATION VISUAL INSPECTION AREA</option>
                    <option value="ZONE - G4 : VMC SORTING DEPARTMENT">ZONE - G4 : VMC SORTING DEPARTMENT</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kaizenIdea" id="lblKaizenIdea">Kaizen Idea <span class="required">*</span></label>
                <textarea id="kaizenIdea" name="kaizenIdea" required placeholder="Describe your improvement idea in detail..."></textarea>
            </div>

            <div class="form-group">
                <label for="category" id="lblCategory">Category</label>
                <select id="category" name="category">
                    <option value="">Select category (optional)</option>
                    <option value="QUALITY">QUALITY</option>
                    <option value="SAFETY">SAFETY</option>
                    <option value="DELIVERY">DELIVERY</option>
                    <option value="COST">COST</option>
                    <option value="TIME">TIME</option>
                    <option value="SYSTEM">SYSTEM</option>
                </select>
            </div>

            <div class="form-group">
                <label id="lblProvidePhoto">Do you want to attach a photo?</label>
                <div class="yes-no-toggle">
                    <button type="button" class="toggle-btn" onclick="toggleOptionalField('photo', true)" id="btnPhotoYes">Yes</button>
                    <button type="button" class="toggle-btn active" onclick="toggleOptionalField('photo', false)" id="btnPhotoNo">No</button>
                </div>
            </div>

            <div class="form-group optional-field photo-upload-section" id="photoField">
                <label for="photo" id="lblPhoto">Upload Photos (Max 5)</label>
                <div class="file-input-wrapper">
                    <label for="photo" class="file-input-btn">
                        <span id="photoIcon">📷</span>
                        <span id="photoText">Choose Photos</span>
                    </label>
                    <input type="file" id="photo" name="photo" accept="image/*" multiple onchange="handlePhotoUpload(event)">
                </div>
                <div class="photo-count" id="photoCount"></div>
                <div class="photo-grid" id="photoGrid"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Idea</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Submitting...</p>
            </div>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyh32RsxEeJJg4WDveqNUst0kMnsqAB4zNRUPBNC3TEUSObMoem8ZHRGtfZULr1E_KRpw/exec';

        const form = document.getElementById('kaizenForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');

        let currentLanguage = 'en';

        // Language translations
        const translations = {
            en: {
                mainTitle: '💡 Kaizen Idea Submission',
                subtitle: 'Share your continuous improvement ideas',
                lblName: 'Full Name',
                namePlaceholder: 'Enter your full name',

                mobilePlaceholder: 'Enter your 10-digit mobile number',

                photoText: 'Choose Photos',
                photoCount: 'photos selected',
                photoMax: 'Maximum 5 photos allowed',
                btnYes: 'Yes',
                btnNo: 'No',
                submitBtn: 'Submit Idea',
                submitting: 'Submitting...',
                successMsg: 'Success! Your Kaizen idea has been submitted.',
                successModalTitle: 'Kaizen Submitted Successfully!',
                successModalDesc: 'Thank you for your valuable idea. Your Kaizen has been recorded and will be reviewed by the team.',
                successOkBtn: 'OK',
                mobileError: 'Please enter a valid 10-digit mobile number.',
                errorMsg: 'There was an error submitting your idea. Please try again.',
                departments: {
                    select: 'Select your department',
                    zone_a1: 'ZONE - A1 : STAMPING (PRESS-SHOP)',
                    zone_a2: 'ZONE - A2 : MAINTENANCE & STORE',
                    zone_a3: 'ZONE - A3 : TOOL ROOM & CMM',
                    zone_b1: 'ZONE - B1 : PRODUCT ENGINEERING (P.E.)',
                    zone_b2: 'ZONE - B2 : OFFICE (SALES, MARKETING, ACCOUNTS, PURCHASE & HR)',
                    zone_c1: 'ZONE - C1 : SQA RAW MATERIAL STORE - METAL STRIP',
                    zone_c2: 'ZONE - C2 : PACKING & DISPATCH - STAMPING FINISHED GOOD STORE - STAMPING',
                    zone_d1: 'ZONE - D1 : INJECTION MOULDING - FG STORE',
                    zone_d2: 'ZONE - D2 : SHOPFLOOR - INJECTION MOULDING IQA - INJECTION MOULDING',
                    zone_d3: 'ZONE - D3 : SPARKING & WIRE CUT',
                    zone_e1: 'ZONE - E1 : IQA - STAMPING',
                    zone_e2: 'ZONE - E2 : SHOPFLOOR - STAMPING IQA - STAMPING',
                    zone_f1: 'ZONE - F1 : ETS',
                    zone_f2: 'ZONE - F2 : WIRE CUT',

        function toggleOptionalField(fieldName, show) {
            const field = document.getElementById(fieldName + 'Field');
            const input = document.getElementById(fieldName);
            
            if (show) {
                field.classList.add('show');
                // Update button states
                if (fieldName === 'email') {
                    document.getElementById('btnEmailYes').classList.add('active');
                    document.getElementById('btnEmailNo').classList.remove('active');
                } else if (fieldName === 'employeeId') {
                    document.getElementById('btnEmpIdYes').classList.add('active');
                    document.getElementById('btnEmpIdNo').classList.remove('active');
                } else if (fieldName === 'photo') {
                    document.getElementById('btnPhotoYes').classList.add('active');
                    document.getElementById('btnPhotoNo').classList.remove('active');
                }
            } else {
                field.classList.remove('show');
                if (fieldName === 'photo') {
                    removePhoto(); // Clear photo preview
                } else {
                    input.value = ''; // Clear the field when hiding
                }
                // Update button states
                if (fieldName === 'email') {
                    document.getElementById('btnEmailYes').classList.remove('active');
                    document.getElementById('btnEmailNo').classList.add('active');
                } else if (fieldName === 'employeeId') {
                    document.getElementById('btnEmpIdYes').classList.remove('active');
                    document.getElementById('btnEmpIdNo').classList.add('active');
                } else if (fieldName === 'photo') {
                    document.getElementById('btnPhotoYes').classList.remove('active');
                    document.getElementById('btnPhotoNo').classList.add('active');
                }
            }
        }

        let uploadedPhotos = []; // Array to store multiple photos
        const MAX_PHOTOS = 5;

        function handlePhotoUpload(event) {
            const files = Array.from(event.target.files);
            const t = translations[currentLanguage];
            
            if (uploadedPhotos.length + files.length > MAX_PHOTOS) {
                alert(t.photoMax || `Maximum ${MAX_PHOTOS} photos allowed`);
                event.target.value = '';
                return;
            }
            
            files.forEach(file => {
                if (uploadedPhotos.length < MAX_PHOTOS) {
                    compressImage(file, 800, 0.72).then(compressedBase64 => {
                        const photoData = { base64: compressedBase64, name: file.name };
                        uploadedPhotos.push(photoData);
                        updatePhotoGrid();
                    });
                }
            });
        }

        function compressImage(file, maxSize, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else       { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updatePhotoGrid() {
            const grid = document.getElementById('photoGrid');
            const countEl = document.getElementById('photoCount');
            const t = translations[currentLanguage];
            
            grid.innerHTML = '';
            
            uploadedPhotos.forEach((photo, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                photoItem.innerHTML = `
                    <img src="${photo.base64}" alt="${photo.name}">
                    <button type="button" class="remove-photo" onclick="removePhoto(${index})">×</button>
                `;
                grid.appendChild(photoItem);
            });
            
            if (uploadedPhotos.length > 0) {
                countEl.textContent = `${uploadedPhotos.length} ${t.photoCount || 'photos selected'}`;
            } else {
                countEl.textContent = '';
            }
        }

        function removePhoto(index) {
            if (index !== undefined) {
                // Remove specific photo
                uploadedPhotos.splice(index, 1);
            } else {
                // Remove all photos
                uploadedPhotos = [];
            }
            
            document.getElementById('photo').value = '';
            updatePhotoGrid();
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const t = translations[currentLanguage];

            // Validate mobile number
            const mobile = document.getElementById('mobile').value.trim();
            if (!/^[0-9]{10}$/.test(mobile)) {
                alert(t.mobileError || 'Please enter a valid 10-digit mobile number.');
                document.getElementById('mobile').focus();
                return;
            }

            const formData = {
                timestamp: new Date().toLocaleString(),
                name: document.getElementById('name').value.trim(),
                mobile: mobile,
                email: document.getElementById('email').value.trim() || 'Not provided',
                employeeId: document.getElementById('employeeId').value.trim() || 'Not provided',
                department: document.getElementById('department').value,
                kaizenIdea: document.getElementById('kaizenIdea').value.trim(),
                category: document.getElementById('category').value || 'Not specified',
                photos: uploadedPhotos.length > 0 ? uploadedPhotos : [{ base64: 'No photo attached', name: 'none' }]
            };

            // Show full-screen loading overlay
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('overlayText').textContent = t.submitting || 'Submitting your Kaizen...';
            overlay.classList.add('active');
            submitBtn.disabled = true;
            message.style.display = 'none';

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                // Show success modal
                overlay.classList.remove('active');
                document.getElementById('successTitle').textContent = t.successModalTitle || 'Kaizen Submitted Successfully!';
                document.getElementById('successDesc').textContent = t.successModalDesc || 'Thank you for your valuable idea. Your Kaizen has been recorded and will be reviewed by the team.';
                document.getElementById('successOkBtn').textContent = t.successOkBtn || 'OK';
                document.getElementById('successModal').classList.add('active');

                // Reset form
                form.reset();
                uploadedPhotos = [];
                updatePhotoGrid();
                toggleOptionalField('email', false);
                toggleOptionalField('employeeId', false);
                toggleOptionalField('photo', false);

            } catch (error) {
                console.error('Error:', error);
                overlay.classList.remove('active');
                showMessage(t.errorMsg, 'error');
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('active');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    message.style.display = 'none';
                }, 5000);
            }
        }
